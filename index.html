<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignis — Gestão Inteligente de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #ff4d4d;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --sidebar-bg: #111111;
            --border: #262626;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Menu Lateral */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo-area {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: #222;
            color: var(--primary);
        }

        /* Área Principal */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* Cards e Grid */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-card h4 { color: var(--text-dim); margin: 0; font-size: 14px; }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 10px 0 0 0; }

        /* Formulários e Tabelas */
        .form-group { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        input, select {
            width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 20px;
            background: #222; border: 1px solid var(--border); color: white; border-radius: 6px;
        }
        button {
            background: var(--primary); color: white; border: none; padding: 12px 25px;
            border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%;
        }

        /* Overlay de Loading */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <p style="margin-top: 15px;">Carregando Ignis...</p>
    </div>

    <div class="sidebar">
        <div class="logo-area">🔥 IGNIS</div>
        <nav>
            <div class="nav-item active" onclick="showScreen('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" onclick="showScreen('veiculos')"><i class="fas fa-truck"></i> Veículos</div>
            <div class="nav-item" onclick="showScreen('abastecimento')"><i class="fas fa-gas-pump"></i> Abastecimento</div>
            <div class="nav-item" onclick="showScreen('motoristas')"><i class="fas fa-users"></i> Motoristas</div>
            <div class="nav-item" onclick="showScreen('relatorios')"><i class="fas fa-file-export"></i> Relatórios</div>
        </nav>
    </div>

    <div class="main-content">
        <div id="dashboard" class="screen active">
            <h2>Resumo da Frota</h2>
            <div class="grid-stats">
                <div class="stat-card"><h4>Total Gasto</h4><p id="dash-gasto">R$ 0,00</p></div>
                <div class="stat-card"><h4>KM Rodados</h4><p id="dash-km">0 km</p></div>
                <div class="stat-card"><h4>Veículos Ativos</h4><p id="dash-veiculos">0</p></div>
            </div>
        </div>

        <div id="veiculos" class="screen"><h2>Gestão de Veículos</h2><div id="area-veiculos"></div></div>
        <div id="abastecimento" class="screen"><h2>Registrar Abastecimento</h2><div id="area-abastecimento"></div></div>
        <div id="motoristas" class="screen"><h2>Cadastro de Motoristas</h2><div id="area-motoristas"></div></div>
        <div id="relatorios" class="screen"><h2>Relatórios e Exportação</h2><div id="area-relatorios"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdfrSrif-vThP3WqWJF76hhKE7FXGFpL0",
            authDomain: "fueltracker-adee5.firebaseapp.com",
            projectId: "fueltracker-adee5",
            storageBucket: "fueltracker-adee5.appspot.com",
            messagingSenderId: "367375252870",
            appId: "1:367375252870:web:96898d9e6027a0709b788c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Navegação Global
        window.showScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // Remover Loading
        window.onload = () => { document.getElementById('loading').style.display = 'none'; };
    </script>
</body>
</html>
