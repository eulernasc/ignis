<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignis — Gestão Inteligente de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #ff4d4d; --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.9; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="container">
    <div class="header">
        <div class="logo">🔥 IGNIS — GESTÃO DE FROTAS</div>
        <div id="userProfile">Carregando...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>🚗 Cadastro de Veículo</h3>
            <input type="text" id="placa" placeholder="Placa do Veículo">
            <input type="text" id="modelo" placeholder="Modelo/Marca">
            <select id="tipoCombustivel">
                <option value="Diesel">Diesel</option>
                <option value="Gasolina">Gasolina</option>
                <option value="Flex">Flex</option>
            </select>
            <button id="btnSalvarVeiculo">Salvar Veículo</button>
        </div>

        <div class="card">
            <h3>⛽ Novo Abastecimento</h3>
            <input type="number" id="kmAtual" placeholder="KM Atual">
            <input type="number" id="litros" placeholder="Quantidade (Litros)">
            <input type="number" id="valorTotal" placeholder="Valor Total (R$)">
            <button id="btnSalvarAbastecimento">Registrar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Configuração do seu Firebase (FuelTracker)
    const firebaseConfig = {
        apiKey: "AIzaSyBdfrSrif-vThP3WqWJF76hhKE7FXGFpL0",
        authDomain: "fueltracker-adee5.firebaseapp.com",
        projectId: "fueltracker-adee5",
        storageBucket: "fueltracker-adee5.appspot.com",
        messagingSenderId: "367375252870",
        appId: "1:367375252870:web:96898d9e6027a0709b788c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.addEventListener('DOMContentLoaded', async () => {
        const loading = document.getElementById('loadingOverlay');
        
        try {
            // Teste de conexão simples
            console.log("Ignis conectado ao Firebase com sucesso.");
            loading.classList.add('hidden');
        } catch (error) {
            console.error("Erro ao iniciar:", error);
            alert("Erro de conexão. Verifique o console.");
        }

        // Função para Salvar Veículo
        document.getElementById('btnSalvarVeiculo').addEventListener('click', async () => {
            const placa = document.getElementById('placa').value;
            if(!placa) return alert("Digite a placa!");
            
            loading.classList.remove('hidden');
            try {
                await setDoc(doc(db, "veiculos", placa), {
                    modelo: document.getElementById('modelo').value,
                    combustivel: document.getElementById('tipoCombustivel').value,
                    dataCadastro: new Date().toISOString()
                });
                alert("Veículo salvo!");
            } catch (e) { console.error(e); }
            loading.classList.add('hidden');
        });

        // Função para Salvar Abastecimento
        document.getElementById('btnSalvarAbastecimento').addEventListener('click', async () => {
            loading.classList.remove('hidden');
            try {
                await addDoc(collection(db, "abastecimentos"), {
                    km: document.getElementById('kmAtual').value,
                    litros: document.getElementById('litros').value,
                    valor: document.getElementById('valorTotal').value,
                    data: new Date().toISOString()
                });
                alert("Abastecimento registrado!");
            } catch (e) { console.error(e); }
            loading.classList.add('hidden');
        });
    });
</script>
</body>
</html>
