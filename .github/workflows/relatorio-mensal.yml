name: Relatório Mensal de Eficiência

on:
  schedule:
    # Roda todo dia 15 às 08:00 horário de Brasília (11:00 UTC)
    - cron: '0 11 15 * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub para testar

jobs:
  enviar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: scripts
        run: npm install

      - name: Rodar relatório e enviar e-mails
        working-directory: scripts
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        run: node relatorio.js
